<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CUPICHO PRO V8.7</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
    
    .modal-overlay { 
        position: fixed; inset: 0; 
        background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); 
        z-index: 2000; 
        display: flex; flex-direction: column; 
        padding: 24px; 
        padding-bottom: max(40px, env(safe-area-inset-bottom)); 
        animation: slideUp 0.3s ease-out; overflow-y: auto;
    }
    
    @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .flash-active { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: rgba(251, 191, 36, 0.5); } 100% { background: transparent; } }
    
    .font-cinzel { font-family: 'Cinzel', serif; }
    
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    #reader { width: 100%; display: flex; justify-content: center; overflow: hidden; position: relative; }
    #reader video { width: 100% !important; object-fit: cover !important; transform: scale(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const safeGetItem = (key, defaultVal) => {
        try {
            const item = localStorage.getItem(key);
            if (!item || item === "undefined" || item === "null") return defaultVal;
            return JSON.parse(item);
        } catch (error) { return defaultVal; }
    };

    const firebaseConfig = {
      apiKey: "AIzaSyA7636rgPhQNCM8V9mgG6uCxKTxpBU7v70",
      authDomain: "cupicho-inventory.firebaseapp.com",
      projectId: "cupicho-inventory",
      storageBucket: "cupicho-inventory.firebasestorage.app",
      messagingSenderId: "1079825488345",
      appId: "1:1079825488345:web:b0446ca4f7ef83675461c8",
      measurementId: "G-9J582TMT6L"
    };

    let db = null;
    if (firebaseConfig) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      } catch(e) { console.error("Firebase Error", e); }
    }

    const LOCATIONS = [
      "辦公室", "梯間", "櫃檯區", "Anthon Berg (展示桌+珠寶櫃+壁櫃)", "DOMORI (展示桌+珠寶櫃+壁櫃)",
      "Best Selling", "Gifts A", "Gifts B", "Elit", "Baci", "Belgian+Hamlet", "Caffarel+Guylian",
      "片裝牆", "Ruta", "Mieszko", "酒區", "中島A", "中島B", "中島C", "中島D", 
      "展示桌A(散巧前方)", "展示桌B(主視覺)", "展示桌C(長桌)"
    ];

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'cupicho-inventory';

    function App() {
      const [masterData, setMasterData] = useState(() => safeGetItem('cup_master_index', []));
      const [masterRows, setMasterRows] = useState(() => safeGetItem('cup_master_rows', []));
      const [inventory, setInventory] = useState(() => safeGetItem('cup_inv', []));
      const [manualBinds, setManualBinds] = useState(() => safeGetItem('cup_binds', {}));
      const [completedLocations, setCompletedLocations] = useState(() => safeGetItem('cup_completed_locs', []));
      
      const [currentLocation, setCurrentLocation] = useState(LOCATIONS[0]);      
      const [scannedBarcode, setScannedBarcode] = useState('');
      const [nameSearchResults, setNameSearchResults] = useState([]); 
      const [currentItem, setCurrentItem] = useState(null); 
      const [qty, setQty] = useState('');
      const [isScanning, setIsScanning] = useState(false);
      
      const scannerRef = useRef(null);

      const [showAdmin, setShowAdmin] = useState(false);
      const [showSummary, setShowSummary] = useState(false);
      const [unknownBarcode, setUnknownBarcode] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [newProductName, setNewProductName] = useState('');

      const dataRef = useRef({ masterData, manualBinds, inventory, currentLocation });

      useEffect(() => { 
        dataRef.current = { masterData, manualBinds, inventory, currentLocation }; 
      }, [masterData, manualBinds, inventory, currentLocation]);

      // 監聽雲端庫存 (強制同步)
      useEffect(() => {
        if (!db) return;
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('inventory_sessions').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudData = doc.data().items || [];
                setInventory(cloudData);
                localStorage.setItem('cup_inv', JSON.stringify(cloudData));
            }
        });
        return () => unsubscribe();
      }, []);

      // 監聽雲端主檔 (強制同步)
      useEffect(() => {
        if (!db) return;
        const unsubscribeMaster = db.collection('artifacts').doc(appId).collection('public').doc('master_full').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if(data.index) {
                    const parsedIndex = JSON.parse(data.index);
                    setMasterData(parsedIndex);
                    localStorage.setItem('cup_master_index', JSON.stringify(parsedIndex));
                }
            }
        });
        return () => unsubscribeMaster();
      }, []);

      const saveInventory = (newInv) => {
        setInventory(newInv);
        localStorage.setItem('cup_inv', JSON.stringify(newInv));
        if (db) {
            db.collection('artifacts').doc(appId).collection('public').doc('inventory_sessions').set({ 
                items: newInv, 
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
            }).catch(e => console.error("雲端同步失敗", e));
        }
      };

      const startScanner = async () => {
        const gate = document.getElementById('cam-gate');
        if (gate) gate.style.display = 'none';
        setIsScanning(true);
        if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");

        try {
          await scannerRef.current.start(
            { facingMode: "environment" },
            { 
              fps: 15, 
              qrbox: (viewfinderWidth, viewfinderHeight) => ({ width: Math.floor(viewfinderWidth * 0.85), height: 250 }),
              experimentalFeatures: { useBarCodeDetectorIfSupported: true },
              formatsToSupport: [1, 2, 8, 9, 10, 11, 12], // 涵蓋所有格式
              videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
            },
            (decodedText) => { 
              const code = String(decodedText).trim(); 
              setScannedBarcode(code);
              const { masterData, manualBinds } = dataRef.current;
              const found = masterData.find(m => m.barcode === code || m.id === code) || manualBinds[code];
              setCurrentItem(found || null);
              if (!found) setUnknownBarcode(code);
              
              if (scannerRef.current) {
                  scannerRef.current.stop().then(() => {
                      setIsScanning(false);
                      const gate = document.getElementById('cam-gate');
                      if (gate) gate.style.display = 'flex';
                  });
              }
            }
          );
        } catch (err) { alert("啟動失敗：" + err); setIsScanning(false); if (gate) gate.style.display = 'flex'; }
      };

      const handleImportTemplate = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (evt) => {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
                
                // 診斷邏輯：如果讀取不到正確欄位，顯示出來
                const headers = rows[0].map(h => String(h).trim());
                
                // 尋找欄位（更寬鬆的比對）
                const findCol = (keys) => headers.findIndex(h => keys.includes(h));
                const idIdx = findCol(['商品碼', '品號', '商品碼']);
                const barIdx = findCol(['條碼', '物料', '商品條碼']);
                const nameIdx = findCol(['品名', '商品名稱規格', '名稱']);

                if (idIdx === -1 || barIdx === -1 || nameIdx === -1) {
                    alert(`⚠️ 格式錯誤！系統偵測到的欄位是：\n${headers.join(', ')}\n\n請確保Excel包含「品號」、「物料」、「品名」欄位。`);
                    return;
                }

                const index = [];
                for(let i=1; i<rows.length; i++){
                    if(rows[i][idIdx] || rows[i][barIdx]){
                        index.push({
                            id: String(rows[i][idIdx] || '').trim(),
                            name: String(rows[i][nameIdx] || '未知').trim(),
                            barcode: String(rows[i][barIdx] || '').replace(/\s+/g, '')
                        });
                    }
                }
                
                setMasterData(index);
                localStorage.setItem('cup_master_index', JSON.stringify(index));
                
                if (db) {
                    db.collection('artifacts').doc(appId).collection('public').doc('master_full').set({ 
                        index: JSON.stringify(index),
                        template: JSON.stringify(rows)
                    }, { merge: true });
                }
                alert(`✅ 成功上傳！共載入 ${index.length} 筆商品資料。`);
            } catch(error) { alert("讀取失敗：" + error.message); }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = ''; 
      };

      return (
        <div className="flex flex-col min-h-screen">
          <header className="p-4 flex justify-between items-center bg-slate-950 border-b border-slate-900">
              <div onClick={() => {setShowSummary(false); setShowAdmin(false);}}>
                  <h1 className="text-xl font-black text-yellow-500 italic">CUPICHO</h1>
                  <p className="text-[9px] text-slate-500 font-bold">主檔資料庫: {masterData.length} 筆</p>
              </div>
              <button onClick={() => setShowAdmin(true)} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold">⚙️ 設定</button>
          </header>

          <section className="relative w-full h-[40vh] bg-black flex items-center justify-center">
              <div id="reader" className="w-full h-full"></div>
              <div id="cam-gate" className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950">
                  <button onClick={startScanner} className="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black text-lg">📷 啟動相機</button>
              </div>
          </section>

          <div className="p-4 flex-1 overflow-y-auto pb-32">
             {/* 這裡保留您原本的操作介面邏輯 */}
             <div className="glass-card rounded-[32px] p-6 mb-4">
                 <select value={currentLocation} onChange={e => setCurrentLocation(e.target.value)} className="w-full bg-slate-900 text-yellow-500 p-4 rounded-2xl mb-4 font-bold border border-slate-700">
                    {LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                 </select>
                 <button onClick={() => handleAddRecord()} className="w-full bg-yellow-500 text-black font-bold py-4 rounded-2xl">確認送出 ({inventory.length})</button>
             </div>
          </div>

          {showAdmin && (
            <div className="modal-overlay">
                <h3 className="text-xl font-bold text-white mb-4">⚙️ 系統管理</h3>
                <div className="bg-blue-900/20 p-6 rounded-3xl border border-blue-500/30">
                    <h4 className="text-blue-400 font-bold mb-2">上傳商品主檔</h4>
                    <input type="file" id="up" className="hidden" onChange={handleImportTemplate} />
                    <button onClick={() => document.getElementById('up').click()} className="bg-blue-600 text-white w-full py-4 rounded-2xl font-bold">📂 選擇 Excel 檔案</button>
                </div>
                <button onClick={() => setShowAdmin(false)} className="mt-4 p-4 text-slate-500 font-bold">關閉</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
