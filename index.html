<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CUPICHO PRO V7.4</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
    
    .modal-overlay { 
        position: fixed; inset: 0; 
        background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); 
        z-index: 2000; 
        display: flex; flex-direction: column; 
        padding: 24px; 
        padding-bottom: max(40px, env(safe-area-inset-bottom)); 
        animation: slideUp 0.3s ease-out; overflow-y: auto;
    }
    
    @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .flash-active { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: rgba(251, 191, 36, 0.5); } 100% { background: transparent; } }
    
    .font-cinzel { font-family: 'Cinzel', serif; }
    
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    #reader { width: 100%; display: flex; justify-content: center; overflow: hidden; position: relative; }
    #reader video { width: 100% !important; object-fit: cover !important; transform: scale(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyA7636rgPhQNCM8V9mgG6uCxKTxpBU7v70",
      authDomain: "cupicho-inventory.firebaseapp.com",
      projectId: "cupicho-inventory",
      storageBucket: "cupicho-inventory.firebasestorage.app",
      messagingSenderId: "1079825488345",
      appId: "1:1079825488345:web:b0446ca4f7ef83675461c8",
      measurementId: "G-9J582TMT6L"
    };

    let db = null;
    if (firebaseConfig) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      } catch(e) { console.error("Firebase Error", e); }
    }

    const LOCATIONS = [
      "辦公室", "梯間", "櫃檯區", "Anthon Berg (展示桌+珠寶櫃+壁櫃)", "DOMORI (展示桌+珠寶櫃+壁櫃)",
      "Best Selling", "Gifts A", "Gifts B", "Elit", "Baci", "Belgian+Hamlet", "Caffarel+Guylian",
      "片裝牆", "Ruta", "Mieszko", "酒區", "中島A", "中島B", "中島C", "中島D", 
      "展示桌A(散巧前方)", "展示桌B(主視覺)", "展示桌C(長桌)"
    ];

    function App() {
      const [masterData, setMasterData] = useState(() => JSON.parse(localStorage.getItem('cup_master')) || []);
      // 👑 保存原始矩陣資料，避免重複欄位名稱造成的資料丟失
      const [rawMasterRows, setRawMasterRows] = useState(() => JSON.parse(localStorage.getItem('cup_raw_rows')) || []);
      const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('cup_inv')) || []);
      const [manualBinds, setManualBinds] = useState(() => JSON.parse(localStorage.getItem('cup_binds')) || {});
      const [completedLocations, setCompletedLocations] = useState(() => JSON.parse(localStorage.getItem('cup_completed_locs')) || []);
      
      const [currentLocation, setCurrentLocation] = useState(LOCATIONS[0]);      
      const [scannedBarcode, setScannedBarcode] = useState('');
      const [nameSearchResults, setNameSearchResults] = useState([]); 
      const [currentItem, setCurrentItem] = useState(null); 
      const [qty, setQty] = useState('');
      const [feedback, setFeedback] = useState('');
      const [isScanning, setIsScanning] = useState(false);
      
      const scannerRef = useRef(null);

      const [showAdmin, setShowAdmin] = useState(false);
      const [showSummary, setShowSummary] = useState(false);
      const [unknownBarcode, setUnknownBarcode] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [newProductName, setNewProductName] = useState('');

      const dataRef = useRef({ masterData, manualBinds, inventory, currentLocation });

      useEffect(() => { 
        dataRef.current = { masterData, manualBinds, inventory, currentLocation }; 
      }, [masterData, manualBinds, inventory, currentLocation]);

      useEffect(() => {
        if (!db) return;
        const unsubscribe = db.collection('inventory_sessions').doc('current').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudData = doc.data().items || [];
                setInventory(cloudData);
                localStorage.setItem('cup_inv', JSON.stringify(cloudData));
            }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!db) return;
        const unsubscribeBinds = db.collection('inventory_settings').doc('global_binds').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudBinds = doc.data().binds || {};
                setManualBinds(cloudBinds);
                localStorage.setItem('cup_binds', JSON.stringify(cloudBinds));
            }
        });
        return () => unsubscribeBinds();
      }, []);

      useEffect(() => {
        if (!db) return;
        const unsubscribeMaster = db.collection('inventory_settings').doc('master_data').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.items) {
                    setMasterData(data.items);
                    localStorage.setItem('cup_master', JSON.stringify(data.items));
                }
                if (data.rawRows) {
                    setRawMasterRows(data.rawRows);
                    localStorage.setItem('cup_raw_rows', JSON.stringify(data.rawRows));
                }
            }
        });
        return () => unsubscribeMaster();
      }, []);

      const saveInventory = (newInv) => {
        setInventory(newInv);
        localStorage.setItem('cup_inv', JSON.stringify(newInv));
        if (db) {
            db.collection('inventory_sessions').doc('current').set({ 
                items: newInv, 
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
            }).catch(e => console.error("雲端同步失敗", e));
        }
      };

      const startScanner = async () => {
        const gate = document.getElementById('cam-gate');
        if (gate) gate.style.display = 'none';
        setIsScanning(true);
        setNameSearchResults([]);
        if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");
        try {
          await scannerRef.current.start({ facingMode: "environment" }, { fps: 10, qrbox: (vw, vh) => ({ width: Math.floor(vw * 0.85), height: 250 }), formatsToSupport: [Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.QR_CODE], videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } }, (decodedText) => { 
              const f = document.getElementById('flash-overlay'); if(f) { f.classList.add('flash-active'); setTimeout(() => f.classList.remove('flash-active'), 300); }
              const code = String(decodedText).trim(); setScannedBarcode(code);
              const { masterData, manualBinds } = dataRef.current;
              const found = masterData.find(m => String(m.barcode) === code || String(m.id) === code) || manualBinds[code];
              setCurrentItem(found || null); setQty('');
              if (!found) setUnknownBarcode(code);
              if (scannerRef.current) scannerRef.current.stop().then(() => { setIsScanning(false); const gate = document.getElementById('cam-gate'); if (gate) gate.style.display = 'flex'; });
            }
          );
        } catch (err) { alert("相機啟動失敗：" + err); setIsScanning(false); }
      };

      const handleManualInput = (text) => {
          setScannedBarcode(text);
          const exactMatch = masterData.find(m => String(m.barcode) === text || String(m.id) === text) || manualBinds[text];
          if (exactMatch) { setCurrentItem(exactMatch); setNameSearchResults([]); } else {
              setCurrentItem(null);
              if (text.length > 0) {
                  const results = masterData.filter(m => m.name.toLowerCase().includes(text.toLowerCase()) || String(m.barcode).includes(text) || String(m.id).includes(text)).slice(0, 15);
                  setNameSearchResults(results);
              } else setNameSearchResults([]);
          }
      };

      const handleAddRecord = () => {
        const parsedQty = parseInt(qty, 10);
        if (!scannedBarcode || isNaN(parsedQty) || parsedQty <= 0) return alert("請輸入有效的條碼與數量！");
        const item = currentItem || { id: "NEW", name: "未知商品" };
        const existingIdx = inventory.findIndex(i => i.barcode === scannedBarcode && i.location === currentLocation);
        let newInv = [...inventory];
        if (existingIdx > -1) {
            newInv[existingIdx].qty += parsedQty; newInv[existingIdx].time = new Date().toLocaleTimeString();
            const updated = newInv.splice(existingIdx, 1)[0]; newInv.unshift(updated);
        } else newInv.unshift({ ...item, barcode: scannedBarcode, qty: parsedQty, location: currentLocation, time: new Date().toLocaleTimeString() });
        saveInventory(newInv); setFeedback(`✅ 已送出: ${item.name}`); setScannedBarcode(''); setCurrentItem(null); setQty(''); setTimeout(() => setFeedback(''), 2500);
      };

      // 👑 修正：矩陣座標式讀取
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
            header: false, skipEmptyLines: true,
            complete: function(res) {
                const rows = res.data;
                const headers = rows[0];
                // 找出關鍵欄位的索引位置
                const idx = {
                    attr: headers.indexOf('屬性'),
                    vendor: headers.indexOf('供應商'),
                    material: headers.indexOf('物料'),
                    id: headers.lastIndexOf('品號'), // 取最後一個品號
                    name: headers.indexOf('品名'),
                    price: headers.indexOf('售價'),
                    box: headers.indexOf('箱入數'),
                    cat: headers.indexOf('中分類')
                };

                const parsedMaster = rows.slice(1).map(row => ({
                    id: String(row[idx.id] || '0'),
                    name: String(row[idx.name] || '未知'),
                    barcode: String(row[idx.material] || '').replace(/\s+/g, '').replace(/\.0$/, ''),
                    // 額外資訊儲存，方便盤點時顯示
                    vendor: row[idx.vendor],
                    price: row[idx.price]
                })).filter(i => i.barcode || i.id !== '0');

                setMasterData(parsedMaster);
                setRawMasterRows(rows); // 保存完整原始矩陣
                localStorage.setItem('cup_master', JSON.stringify(parsedMaster));
                localStorage.setItem('cup_raw_rows', JSON.stringify(rows));

                if (db) {
                    db.collection('inventory_settings').doc('master_data').set({ items: parsedMaster, rawRows: rows });
                }
                alert(`成功匯入 ${parsedMaster.length} 筆資料！格式座標已鎖定。`);
                setShowAdmin(false);
            }
        });
      };

      // 👑 修正：依據圖片二模板強制匯出
      const handleExportERP = () => {
          if (inventory.length === 0) return alert("目前沒有盤點資料！");
          const qtyMap = {};
          inventory.forEach(i => {
              const key = i.id !== '0' && i.id !== 'NEW' ? i.id : i.barcode;
              qtyMap[key] = (qtyMap[key] || 0) + (parseInt(i.qty, 10) || 0);
          });

          // 如果有原始矩陣，就用原始矩陣填入；否則用預設模板
          let csvContent = "\ufeff屬性,供應商,物料,品號,品號,品名,售價,箱入數,中分類,門市庫存\n";
          
          if (rawMasterRows.length > 1) {
              const headers = rawMasterRows[0];
              const idxId = headers.lastIndexOf('品號');
              const idxMat = headers.indexOf('物料');

              rawMasterRows.slice(1).forEach(row => {
                  const key = String(row[idxId] || row[idxMat] || '');
                  const totalQty = qtyMap[key] || 0;
                  // 只取前 9 欄，並在第 10 欄補上數量
                  const newRow = row.slice(0, 9);
                  newRow[9] = totalQty > 0 ? totalQty : '';
                  csvContent += newRow.map(v => `"${v}"`).join(",") + "\n";
                  qtyMap[key] = -1;
              });
          } else {
              // 預備方案
              masterData.forEach(m => {
                  const key = m.id !== '0' ? m.id : m.barcode;
                  const totalQty = qtyMap[key] || 0;
                  csvContent += `"商品","${m.vendor||''}","${m.barcode}","${parseInt(m.id)}","${m.id}","${m.name}","${m.price||''}","","","${totalQty>0?totalQty:''}"\n`;
                  qtyMap[key] = -1;
              });
          }

          // 補上不在主檔內的未知商品
          inventory.forEach(i => {
              const key = i.id !== '0' && i.id !== 'NEW' ? i.id : i.barcode;
              if (qtyMap[key] !== -1) {
                  csvContent += `"商品","","${i.barcode}","","${i.id !== 'NEW' ? i.id : ''}","${i.name}","","","","${i.qty}"\n`;
                  qtyMap[key] = -1;
              }
          });

          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `CUPICHO_盤點匯出_${new Date().toISOString().slice(0,10)}.csv`;
          a.click();
      };

      return (
        <div className="flex flex-col min-h-screen">
          <div id="flash-overlay" className="fixed inset-0 pointer-events-none z-[1100]"></div>
          <header className="p-4 flex justify-between items-center bg-slate-950 border-b border-slate-900 sticky top-0 z-[100]">
              <div className="cursor-pointer" onClick={() => setShowSummary(false)}>
                  <h1 className="text-xl font-black text-yellow-500 italic leading-none">CUPICHO</h1>
                  <p className="text-[9px] font-bold uppercase tracking-widest mt-1 text-slate-500">主檔: {masterData.length}</p>
              </div>
              <button onClick={() => setShowAdmin(true)} className="bg-slate-900 text-slate-400 px-4 py-2 rounded-xl border border-slate-800 text-xs font-bold">⚙️ 管理</button>
          </header>

          <section className="relative w-full min-h-[40vh] bg-black flex items-center justify-center border-b border-slate-900">
              <div id="reader" className="w-full h-full"></div>
              <div id="cam-gate" className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950">
                  <button onClick={startScanner} className="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95">📷 啟動掃描</button>
              </div>
          </section>

          <section className="p-4 -mt-10 relative z-30">
              <div className="glass-card rounded-[32px] p-6 shadow-2xl">
                  <div className="flex flex-col gap-2 mb-4">
                      <select value={currentLocation} onChange={e => setCurrentLocation(e.target.value)} className="w-full bg-black border border-slate-700 text-yellow-500 text-sm px-4 py-3 rounded-2xl outline-none appearance-none">
                          {LOCATIONS.map(loc => <option key={loc} value={loc}>{completedLocations.includes(loc) ? '✅ ' : '📍 '}{loc}</option>)}
                      </select>
                      <div className="text-[10px] text-emerald-500 font-bold px-2 h-4">{feedback}</div>
                  </div>
                  <div className="text-center mb-6 border-b border-slate-800 pb-4">
                      <div className={`text-lg font-bold mb-1 ${currentItem ? 'text-white' : (scannedBarcode ? 'text-red-500' : 'text-slate-400')}`}>
                          {currentItem ? currentItem.name : (scannedBarcode ? '⚠️ 尚未鎖定商品' : '等待掃描...')}
                      </div>
                      <div className="text-xs text-yellow-600 font-cinzel tracking-widest uppercase h-4">
                          {currentItem ? `ID: ${currentItem.id}` : (scannedBarcode ? `IN: ${scannedBarcode}` : '')}
                      </div>
                  </div>
                  <div className="grid grid-cols-4 gap-3 relative">
                      <div className="col-span-3 relative">
                          <input type="text" value={scannedBarcode} onChange={e => handleManualInput(e.target.value)} className="w-full bg-black border border-slate-700 rounded-2xl p-4 text-white font-mono outline-none focus:border-yellow-500 text-sm" placeholder="輸入條碼或品號" />
                          {nameSearchResults.length > 0 && (
                              <div className="absolute z-50 w-full bg-slate-800 border border-slate-600 mt-2 rounded-xl shadow-2xl max-h-[250px] overflow-y-auto">
                                  {nameSearchResults.map(item => (
                                      <div key={item.id} onClick={() => selectSearchResult(item)} className="p-3 border-b border-slate-700/50 hover:bg-slate-700 cursor-pointer flex flex-col gap-1">
                                          <span className="text-white text-xs font-bold">{item.name}</span>
                                          <span className="text-yellow-500 text-[10px] font-cinzel">ID: {item.id}</span>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>
                      <input type="number" value={qty} onChange={e => setQty(e.target.value)} className="col-span-1 bg-black border border-slate-700 rounded-2xl p-4 text-2xl font-cinzel font-black text-center text-yellow-500 outline-none" placeholder="0" />
                      <button onClick={handleAddRecord} className="col-span-4 bg-yellow-500 text-black py-5 rounded-2xl active:scale-95 text-xl font-bold mt-2">確認送出</button>
                  </div>
              </div>
          </section>

          <section className="p-4 flex-1 pb-40">
              <div className="flex justify-between items-center mb-4 px-2">
                  <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">歷史盤點清單</h2>
                  <button onClick={() => setShowSummary(true)} className="text-xs font-bold text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded-lg">📊 進度總覽</button>
              </div>
              <div className="space-y-3">
                  {inventory.map((i, idx) => (
                    <div key={idx} className="glass-card p-4 rounded-3xl flex justify-between items-center">
                        <div className="flex-1 pr-3">
                            <span className="text-[10px] bg-yellow-500 text-black px-2 py-0.5 rounded font-bold">{i.location}</span>
                            <div className="font-bold text-white text-sm mt-1">{i.name}</div>
                            <div className="text-[10px] text-slate-500 font-cinzel mt-1">{i.barcode} • {i.time}</div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="flex items-center bg-slate-800 rounded-lg overflow-hidden">
                                <button onClick={() => { let n = [...inventory]; n[idx].qty = Math.max(1, parseInt(n[idx].qty)-1); saveInventory(n); }} className="px-3 py-2 text-slate-300 font-bold">-</button>
                                <input type="number" value={i.qty} onBlur={() => handleQtyBlur(idx)} onChange={e => { let n = [...inventory]; n[idx].qty = e.target.value; setInventory(n); }} className="text-lg font-cinzel font-black text-yellow-500 w-10 text-center bg-black py-2 outline-none" />
                                <button onClick={() => { let n = [...inventory]; n[idx].qty = parseInt(n[idx].qty)+1; saveInventory(n); }} className="px-3 py-2 text-slate-300 font-bold">+</button>
                            </div>
                        </div>
                    </div>
                  ))}
              </div>
          </section>

          <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[95%] max-w-sm z-[100]">
              <div className="bg-yellow-500 p-4 rounded-3xl flex justify-between items-center px-4 shadow-2xl border-4 border-slate-950">
                  <div className="flex flex-col">
                    <span className="text-black font-bold text-[8px] uppercase">Total</span>
                    <span className="text-2xl font-cinzel font-black text-black leading-none">{inventory.reduce((a, b) => a + (parseInt(b.qty)||0), 0)}</span>
                  </div>
                  <div className="flex gap-1">
                      <button onClick={handleDeleteCurrentSession} className="bg-red-600 text-white px-2 py-2 rounded-xl text-xs font-black">刪除</button>
                      <button onClick={handleExportERP} className="bg-black text-yellow-500 px-3 py-2 rounded-xl text-xs font-black whitespace-nowrap">匯出總表</button>
                  </div>
              </div>
          </div>

          {unknownBarcode && (
            <div className="modal-overlay">
                <button onClick={() => setUnknownBarcode(null)} className="bg-red-600 text-white px-4 py-2 rounded-xl font-bold text-sm self-start mb-4">⬅ 返回</button>
                <div className="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-2xl mb-6 text-center">
                    <p className="text-[10px] text-yellow-500">掃描到未知條碼</p>
                    <p className="text-2xl font-cinzel font-bold text-white">{unknownBarcode}</p>
                </div>
                <div className="bg-slate-900 p-5 rounded-3xl border border-slate-800 mb-4">
                  <h4 className="text-emerald-400 font-bold mb-3 text-sm">選項 A：新增全新商品</h4>
                  <input type="text" value={newProductName} onChange={e=>setNewProductName(e.target.value)} className="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none mb-3" placeholder="輸入商品名稱"/>
                  <button onClick={() => { if(!newProductName) return; const nb = { ...manualBinds, [unknownBarcode]: { id: "NEW", name: newProductName } }; setManualBinds(nb); localStorage.setItem('cup_binds', JSON.stringify(nb)); setCurrentItem({ id: "NEW", name: newProductName }); setUnknownBarcode(null); }} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">✅ 新增並鎖定</button>
                </div>
            </div>
          )}

          {showAdmin && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6"><h3 className="text-2xl font-bold text-white italic">⚙️ 系統設定</h3><button onClick={() => setShowAdmin(false)} className="text-slate-500 text-4xl">×</button></div>
                <div className="bg-emerald-900/20 border border-emerald-500/30 p-6 rounded-[32px] mb-6">
                    <h4 className="text-emerald-500 font-bold mb-2">📥 匯入 ERP 商品主檔</h4>
                    <input type="file" accept=".csv" style={{ display: 'none' }} id="csv-file" onChange={handleImportCSV} />
                    <button onClick={() => document.getElementById('csv-file').click()} className="bg-emerald-600 text-white w-full py-4 rounded-2xl font-bold mt-2">📁 選擇檔案</button>
                </div>
                <button onClick={() => { localStorage.clear(); location.reload(); }} className="text-slate-600 text-xs font-bold py-4 mt-auto">重置系統</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
